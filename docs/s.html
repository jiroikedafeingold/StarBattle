<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Open this board · Star Battle+</title>
<style>
  :root { --gold:#f2b01e; --blue:#2e6be5; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% 30%, #1e3370 0%, #0a1230 60%, #070e24 100%);
    color: #fff; font: 17px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px; min-height: 100%;
  }
  .card { max-width: 420px; width: 100%; }
  h1 { font-size: 34px; font-weight: 800; letter-spacing: .5px; margin: 0 0 6px; }
  h1 .star { color: var(--gold); } h1 .battle { color: #7aa6f7; }
  p.sub { color: #b9c4e6; margin: 0 0 28px; }
  a.btn {
    display: block; width: 100%; padding: 15px 18px; margin: 12px 0; border-radius: 14px;
    font-weight: 700; text-decoration: none; color: #fff;
  }
  a.primary { background: var(--blue); }
  a.store { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18); }
  .hint { color: #8b97bd; font-size: 14px; margin-top: 22px; }
  .bad { color: #ffb3b3; }
</style>
</head>
<body>
  <div class="card">
    <h1><span class="star">STAR</span> <span class="battle">BATTLE</span><span class="star">+</span></h1>
    <p class="sub" id="sub">Someone shared a board with you.</p>
    <a class="btn primary" id="open" href="#">Open in the app</a>
    <a class="btn store" id="store" href="./">Get Star Battle+</a>
    <p class="hint" id="hint">If the app doesn’t open, tap “Get Star Battle+”.</p>
  </div>

<script>
  // Where to send people who don't have the app yet. Replace with the App Store URL
  // once the app is published, e.g. "https://apps.apple.com/app/idXXXXXXXXXX".
  var APP_STORE_URL = "./";

  function token() {
    var b = new URLSearchParams(location.search).get("b");
    if (b) return b;
    var h = (location.hash || "").replace(/^#/, "");
    return h || null;
  }

  var t = token();
  var openBtn = document.getElementById("open");
  var storeBtn = document.getElementById("store");
  storeBtn.href = APP_STORE_URL;

  if (!t) {
    document.getElementById("sub").innerHTML =
      '<span class="bad">This link is missing its board.</span>';
    openBtn.style.display = "none";
    document.getElementById("hint").textContent = "";
  } else {
    var deepLink = "starbattleplus://b/" + t;
    openBtn.href = deepLink;
    // Try to hand off to the app immediately; if it isn't installed, nothing happens
    // and the fallback buttons remain.
    setTimeout(function () { window.location.href = deepLink; }, 250);
  }
</script>
</body>
</html>
